name: mlflow-demo-iris-ci
on:
  push:
    branches:
      - master
#  pull_request:
#    types: [opened, reopened]
#    branches:
#      - master
permissions:
  id-token: write
  contents: read
env:
  AWS_REGION: us-east-1
  APPLICATION: mlflow-demo-iris
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::127923327338:role/github-actions-mlflow
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
      - name: ECR login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Setup buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build/push Training image
        uses: docker/build-push-action@v5
        env:
          DOCKER_IMAGE: "${{ steps.login-ecr.outputs.registry }}/${{ env.APPLICATION }}:latest"
        with:
          context: mlflow/
          push: true
          tags: ${{ env.DOCKER_IMAGE }}
  push-training:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: "127923327338.dkr.ecr.us-east-1.amazonaws.com/mlflow-demo-iris:latest"
    steps:
      - name: push training
        run: mlflow run /mlflow/projects/code/ --backend kubernetes --backend-config /mlflow/projects/code/kubernetes_backend.json 